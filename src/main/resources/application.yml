server:
  port: 5000

spring:
  application:
    name: similar-products

similar-products:
  detail-concurrency: 8
  cache:
    enabled: true
    ttl: 5m
    max-size: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

clients:
  products:
    base-url: ${PRODUCTS_API_BASE_URL:http://localhost:3001}
    connect-timeout: 1s
    response-timeout: 10s
    max-connections: 500
    pending-acquire-timeout: 2s
